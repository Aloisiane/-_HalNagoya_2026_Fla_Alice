<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>フランス語単語落ちゲーム</title>
  <link rel="stylesheet" href="CSS/style.css">
</head>
<body class="jeu">

  <!-- HEADER identique au reste du site -->
  <header>
    <nav>
      <a class="brand" href="index.html">
        <img src="image/HatsuonNoTabiJaune2.gif" alt="Logo">
      </a>

      <div class="top-nav">
        <a href="index.html">ホーム</a>
        <a href="progress.html">進捗</a>
        <a href="success.html">成績</a>
        <a href="setting.html">設定</a>
        <a href="login.html">ログアウト</a>
      </div>
    </nav>
  </header>

  <main class="game-main">
    <h1 class="game-title">フランス語単語落ちゲーム</h1>

    <!-- Infos scoreboard : score + (vies OU timer) -->
    <div id="game-info">
      <div>スコア：<span id="score">0</span></div>

      <!-- Wrapper des vies avec un id + les cœurs -->
      <div id="lives-wrapper" class="life">
        <img src="image/coeursBleuMarine.png" class="heart" data-life="1">
        <img src="image/coeursBlanc.png" class="heart" data-life="2">
        <img src="image/coeursRouge.png" class="heart" data-life="3">
      </div>

      <div id="timer-wrapper">残り時間：<span id="timer">60</span> 秒</div>
    </div>

    <div id="game-area"></div>

    <p class="game-hint">
      落ちてくるフランス語の単語をクリックして、その単語を発音してください。<br>
      正しく発音できるとスコアが増えます。
    </p>
  </main>

  <!-- Script dédié au jeu -->
  <script src="javascript/frenchWordGame.js"></script>
</body>
</html>
